name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.13
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Pytest
      run: |
        pytest tests/

  build-docker:
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Backend Image
      run: docker build -t omnicontent-backend .
      
    - name: Build Frontend Image
      run: docker build -t omnicontent-frontend ./frontend
